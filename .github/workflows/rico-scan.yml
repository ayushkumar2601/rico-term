name: RICO Security Scan

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  security-scan:
    name: API Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: Run RICO Security Scan
        id: rico-scan
        continue-on-error: true  # Don't fail the workflow for demo purposes
        env:
          API_URL: ${{ secrets.API_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "🔍 Running RICO security scan..."
          
          # Run RICO scan (without fail-on for demo purposes)
          # In production, add: --fail-on critical
          rico report \
            --spec demo-api/demo.yaml \
            --url "${API_URL:-https://jsonplaceholder.typicode.com}" \
            --output reports \
            --max-endpoints 5 \
            || echo "SCAN_FAILED=true" >> $GITHUB_ENV
          
          echo "✅ Scan completed"
      
      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rico-security-report
          path: reports/
          retention-days: 30
      
      - name: Comment PR with Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read markdown report
            let reportContent = '## 🔒 RICO Security Scan Results\n\n';
            
            try {
              const report = fs.readFileSync('reports/report.md', 'utf8');
              
              // Extract summary section
              const summaryMatch = report.match(/## Executive Summary([\s\S]*?)---/);
              if (summaryMatch) {
                reportContent += summaryMatch[1].trim() + '\n\n';
              }
              
              reportContent += '📊 [View Full Report](../actions/runs/${{ github.run_id }})\n\n';
              
              // Check for vulnerabilities
              if (report.includes('🔴 Critical:') && !report.includes('🔴 Critical: 0')) {
                reportContent += '⚠️ **Critical vulnerabilities detected!**\n';
                reportContent += '_Note: This is a demo repository. In production, enable `--fail-on critical` to block merges._\n';
              } else {
                reportContent += '✅ No critical vulnerabilities detected.\n';
              }
            } catch (error) {
              reportContent += '❌ Failed to read security report.\n';
            }
            
            // Post comment
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reportContent
            });
      
      - name: Report vulnerabilities (Demo Mode)
        if: env.SCAN_FAILED == 'true'
        run: |
          echo "⚠️ Vulnerabilities detected in scan"
          echo "This is a demo repository - build continues"
          echo "In production, enable --fail-on critical to block merges"
