openapi: 3.0.0
info:
  title: Demo API
  version: 1.0.0
  description: A demo API for testing RICO parser

servers:
  - url: https://api.example.com/v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  /login:
    post:
      summary: User login
      description: Authenticate user and return JWT token
      security: []  # No auth required for login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
          description: Username for login
        - name: password
          in: query
          required: true
          schema:
            type: string
          description: Password for login
      responses:
        '200':
          description: Successful login
        '401':
          description: Invalid credentials

  /users/{id}:
    get:
      summary: Get user by ID
      description: Retrieve user information by user ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: User ID
        - name: include_details
          in: query
          required: false
          schema:
            type: boolean
          description: Include detailed user information
      responses:
        '200':
          description: User found
        '404':
          description: User not found

  /admin:
    delete:
      summary: Delete admin resource
      description: Delete administrative resources (requires authentication)
      parameters:
        - name: resource_id
          in: query
          required: true
          schema:
            type: string
          description: ID of the resource to delete
        - name: force
          in: query
          required: false
          schema:
            type: boolean
          description: Force deletion without confirmation
      responses:
        '204':
          description: Successfully deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
